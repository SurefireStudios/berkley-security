name = "mailgun-worker"
main = "mailgun-worker.js"
compatibility_date = "2024-01-01"

[vars]
# Replace with your actual values in Cloudflare Workers dashboard or via wrangler secret
# MAILGUN_API_KEY should be set as a secret: wrangler secret put MAILGUN_API_KEY
# MAILGUN_DOMAIN should be your Mailgun verified domain (e.g., mg.yourdomain.com)
MAILGUN_DOMAIN = "mg.yourdomain.com"